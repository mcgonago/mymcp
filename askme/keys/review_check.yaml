# Review Check (Basic Status Check)
#
# Usage in Cursor chat:
#   "check review 967773"
#   "execute key review-check for 967773"
#
# What this does:
#   1. If NO assessment exists yet:
#      - Creates initial assessment (same as "assess review 967773")
#   2. If assessment exists:
#      - Queries MCP agent for latest review state
#      - Detects changes since last check:
#        * New patchsets
#        * New comments
#        * Status changes (merged, abandoned, etc.)
#      - If NO changes: Shows nice visual "no changes" box
#      - If changes detected: Shows summary and asks what you want to do
#   3. Updates assessment with check history entry
#
# This is the BASIC check - it tells you what changed but doesn't automatically
# create new patchset assessments. Use the other check variants for that.

type: review_check_basic

action: check_status_and_report

# Check process
check_config:
  check_if_assessment_exists: true
  assessment_location: "workspace/iproject/results/review_{number}.md"
  query_latest_state: true
  detect_changes: true
  
# First-time behavior (no assessment exists)
first_time_behavior:
  create_initial_assessment: true
  treat_as_new_review: true
  use_current_patchset: true  # Whatever patchset is current becomes "patchset 1" for our purposes
  
# What to detect
detect:
  - new_patchsets
  - new_comments
  - status_changes
  - merge_status

# Behavior when NO changes detected
no_changes_behavior:
  show_visual_box: true
  add_to_check_history: true
  use_box_format: true
  
# Visual output when no changes
no_changes_output: |
  ╔════════════════════════════════════════════════════════════════╗
  ║                                                                ║
  ║   ✓ CHECKED review {number} - No changes since last check     ║
  ║                                                                ║
  ║   • Patchset: {current_patchset}                              ║
  ║   • Status: {status}                                          ║
  ║   • Last checked: {last_check_date}                           ║
  ║   • No new patchsets, comments, or status changes             ║
  ║                                                                ║
  ╚════════════════════════════════════════════════════════════════╝

# Behavior when changes detected
changes_detected_behavior:
  show_summary: true
  list_what_changed: true
  add_to_check_history: true
  suggest_next_actions: true
  dont_auto_create_patchsets: true  # Basic check doesn't auto-create, just reports

# Update behavior
update_behavior:
  add_check_history: true  # Add to "Check History" section in assessment
  update_metadata: true  # Update review state tracking
  preserve_previous_analysis: true

# Output when changes detected
changes_output:
  show_changes_summary: true
  show_new_comments: true
  show_new_patchsets_count: true
  recommend_next_steps: true  # e.g., "Run 'check review 967773 create patchsets' to analyze all patchsets"

# Examples:
examples:
  - input: "check review 967773"
    does:
      - "Reads workspace/iproject/results/review_967773.md"
      - "Queries @opendev-reviewer-agent for latest state"
      - "Compares current state with metadata"
      - "Adds check entry to Check History"
      - "Reports: No changes / New patchset / New comments / etc."
      
  - input: "check review 967773"
    scenario: "New patchset detected"
    does:
      - "Creates workspace/iproject/results/review_967773_patchset_2.md"
      - "Fetches new patchset code"
      - "Completes full assessment for patchset 2"
      - "Updates review_967773.md dashboard with link"
      - "Reports: New patchset 2 detected, assessment created"

notes: |
  This is the "morning check-in" workflow where you ask about reviews
  you're tracking without re-fetching the code.
  
  The AI will intelligently detect what changed and take appropriate action:
  - No changes → Quick "no updates" message
  - New comments → Show comments and suggest responses
  - New patchset → Create full new assessment
  - Status change → Update and notify

